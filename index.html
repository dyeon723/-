<style>
:root{--bg:#0d0f18;--sf:#161929;--sf2:#1d2035;--bd:#272b42;--ac:#5b9cf6;--ac2:#f5c842;--ok:#3ecf8e;--ng:#f05a5a;--tx:#e4e8f5;--tx2:#8e97be;--tx3:#5a6285;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
.hd{background:linear-gradient(135deg,#161929,#0d0f18);border-bottom:2px solid var(--ac);padding:18px 24px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.hd h1{font-size:1.25rem;font-weight:900;color:var(--ac);}

.hbtns{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.fb{background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);padding:5px 12px;border-radius:20px;font-size:.74rem;cursor:pointer;font-family:inherit;transition:all .2s;}
.fb:hover,.fb.on{background:var(--ac);color:#fff;border-color:var(--ac);}
.bdg{background:var(--ac);color:#fff;font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:12px;}
.sb{padding:9px 24px;background:var(--sf);border-bottom:1px solid var(--bd);}
.sb input{width:100%;max-width:360px;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:6px 12px;border-radius:8px;font-family:inherit;font-size:.82rem;outline:none;}

.main{max-width:860px;margin:0 auto;padding:18px 14px 60px;display:flex;flex-direction:column;gap:13px;}
/* card */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden;transition:border-color .2s;}
.card:hover{border-color:var(--ac);}
.ch{display:flex;align-items:flex-start;gap:10px;padding:13px 15px 11px;cursor:pointer;user-select:none;}
.cn{background:var(--ac);color:#fff;font-weight:900;font-size:.75rem;min-width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ct{flex:1;}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}

.tg-yr{background:rgba(255,255,255,.05);color:var(--tx3);font-size:.62rem;}
.qt{font-size:.9rem;line-height:1.65;color:var(--tx);font-weight:500;}
.arr{color:var(--tx3);font-size:.88rem;flex-shrink:0;margin-top:5px;transition:transform .25s;}
.card.open .arr{transform:rotate(180deg);}
/* opts */
.opts{padding:0 15px 12px 57px;display:flex;flex-direction:column;gap:4px;}
.opt{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;border-radius:7px;border:1px solid transparent;font-size:.84rem;color:var(--tx2);line-height:1.5;cursor:pointer;transition:all .18s;}
.opt:hover:not(.lk){background:rgba(91,156,246,.07);border-color:rgba(91,156,246,.2);}
.on{font-size:.73rem;font-weight:700;min-width:17px;color:var(--tx3);padding-top:1px;flex-shrink:0;}
.opt.sel{background:rgba(91,156,246,.1);border-color:rgba(91,156,246,.35);color:var(--tx);}
.opt.cor{background:rgba(62,207,142,.09);border-color:rgba(62,207,142,.35);color:var(--ok)!important;}
.opt.cor .on{color:var(--ok);}
.opt.wrg{background:rgba(240,90,90,.09);border-color:rgba(240,90,90,.3);color:var(--ng)!important;}
.opt.wrg .on{color:var(--ng);}
/* body */
.cbody{display:none;border-top:1px solid var(--bd);}
.card.open .cbody{display:block;}
.abar{display:flex;align-items:center;gap:9px;padding:10px 15px;background:var(--sf2);border-bottom:1px solid var(--bd);flex-wrap:wrap;}
.ckbtn{background:var(--ac);color:#fff;border:none;padding:6px 15px;border-radius:7px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;}
.ckbtn:hover{background:#4a87e8;}
.rtbtn{background:transparent;color:var(--tx3);border:1px solid var(--bd);padding:6px 13px;border-radius:7px;font-size:.75rem;cursor:pointer;font-family:inherit;transition:all .2s;}
.rtbtn:hover{color:var(--ac);border-color:var(--ac);}
.rmsg{font-size:.8rem;font-weight:700;}
.rmsg.ok{color:var(--ok);}
.rmsg.ng{color:var(--ng);}
.ansbar{display:flex;align-items:center;gap:9px;padding:9px 15px;background:rgba(62,207,142,.05);border-bottom:1px solid var(--bd);}
.albl{font-size:.68rem;font-weight:700;color:var(--ok);text-transform:uppercase;letter-spacing:.5px;}
.aval{font-weight:900;font-size:.9rem;color:var(--ok);}
.expl{padding:13px 15px 15px;font-size:.83rem;line-height:1.85;color:var(--tx2);}
.expl strong{color:var(--ac2);font-weight:700;}
.fb0{background:#0b0e16;border:1px solid var(--bd);border-left:3px solid var(--ac);border-radius:6px;padding:11px 14px;margin:9px 0;line-height:2.1;overflow-x:auto;}
.fl{margin:2px 0;white-space:nowrap;}
.tip{background:rgba(245,200,66,.06);border:1px solid rgba(245,200,66,.2);border-radius:6px;padding:8px 12px;margin-top:8px;font-size:.8rem;color:var(--ac2);}
.tip::before{content:"💡 ";}
.ctbl{width:100%;border-collapse:collapse;margin:9px 0;font-size:.79rem;}
.ctbl th,.ctbl td{border:1px solid var(--bd);padding:5px 9px;text-align:center;}
.ctbl th{background:var(--sf2);color:var(--ac);font-weight:700;}
.ctbl td{color:var(--tx2);}
.gw{margin:11px 0;text-align:center;}

<script>
const N=['①','②','③','④'];
const QS=[
{n:1,g:'s',yr:'산업 03년 3회',q:'직류기를 구성하고 있는 3요소는?',
 o:['전기자, 계자, 슬립링','전기자, 계자, 정류자','전기자, 정류자, 브러시','전기자, 계자, 보상권선'],ans:2,
 e:`<strong>직류기 3요소</strong> : 전기자, 계자, 정류자<br>교류기 3요소 : 전기자, 계자, 슬립링`},

{n:2,g:'s',yr:'산업 14년 1회',q:'직류기에서 공극을 사이에 두고 전기자와 함께 자기회로를 형성하는 것은?',
 o:['계자','슬롯','정류자','브러시'],ans:1,
 e:`<strong>계자</strong> : 철심에 코일을 감아서 전류를 흘려 여자현상으로 자속을 만드는 부분`},

{n:4,g:'s',yr:'산업 16년 3회',q:'다음 중 직류기의 전기자에 사용되지 않는 권선법은?',
 o:['이층권','고상권','폐로권','단층권'],ans:4,
 e:`직류기 전기자권선법 : 고상권(개로권·폐로권), 이층권(중권·파권)<br><strong>단층권은 사용되지 않는다.</strong>`},

{n:5,g:'gs',yr:'기사 12년 1회(유사) / 산업 93년 2회·94년 5회·97년 2회·06년 3회',
 q:'전기자도체의 굵기, 권수, 극수가 모두 같을 때 단중 파권이 단중 중권에 비교하여 다른 것은?',
 o:['대전류, 고전압','소전류, 고전압','대전류, 저전압','소전류, 저전압'],ans:2,
 e:`<table class="ctbl"><tr><th>구분</th><th>중권</th><th>파권</th></tr>
<tr><td>병렬회로수(a)</td><td>P극수</td><td>2</td></tr>
<tr><td>브러시수(b)</td><td>P극수</td><td>2</td></tr>
<tr><td>용도</td><td>저전압·대전류</td><td>고전압·소전류</td></tr>
<tr><td>균압환</td><td>사용함</td><td>사용안함</td></tr></table>`},

{n:9,g:'s',yr:'산업 15년 3회',
 q:'다음 직류기의 권선법에 대한 설명 중 틀린 것은?',
 o:['전기자권선에 환상권은 거의 사용되지 않는다.','전기자권선에는 고상권이 주로 이용되고 있다.','정류를 양호하게 하기 위해 단절권이 이용된다.','저전압 대전류 직류기에는 파권이 적당하며 고전압 직류기에는 중권이 적당하다.'],ans:4,
 e:`① 전기자권선에 <strong>환상권</strong>은 거의 사용되지 않는다. <span style="color:var(--ok)">→ 맞음</span><br>
&nbsp;&nbsp;&nbsp;(환상권은 철심 내부 도체가 기전력에 기여하지 못해 비효율적)<br><br>
② 전기자권선에는 <strong>고상권(드럼권)</strong>이 주로 이용된다. <span style="color:var(--ok)">→ 맞음</span><br>
&nbsp;&nbsp;&nbsp;(철심 외부에만 도체 배치 → 효율적, 현재 직류기에 표준적으로 사용)<br><br>
③ 정류를 양호하게 하기 위해 <strong>단절권</strong>이 이용된다. <span style="color:var(--ok)">→ 맞음</span><br>
&nbsp;&nbsp;&nbsp;(코일피치 &lt; 극피치 → 정류 개선, 고조파 감소)<br><br>
④ 저전압 대전류 직류기에는 파권이 적당하며 고전압 직류기에는 중권이 적당하다. <span style="color:var(--ng)">→ 틀림 ✗</span><br><br>
<div class="tip">저전압·대전류 → <strong>중권</strong> &nbsp;|&nbsp; 고전압·소전류 → <strong>파권</strong><br>
(파권은 병렬회로수 a=2로 고정되어 항상 직렬 연결 → 고전압·소전류에 적합)</div>
<table class="ctbl" style="margin-top:10px"><tr><th>구분</th><th>중권</th><th>파권</th></tr>
<tr><td>병렬회로수(a)</td><td>P (극수)</td><td>2 (극수 무관)</td></tr>
<tr><td>브러시수(b)</td><td>P (극수)</td><td>2</td></tr>
<tr><td>용도</td><td>저전압·대전류</td><td>고전압·소전류</td></tr>
<tr><td>균압환</td><td>사용함</td><td>사용 안 함</td></tr></table>`},

{n:11,g:'s',yr:'산업 90년 2회·95년 6회·03년 2회',
 q:'4극 전기자권선이 단중 중권인 직류발전기의 전기자전류가 20[A]이면 각 전기자권선의 병렬회로에 흐르는 전류[A]는?',
 o:['10','8','5','2'],ans:3,
 e:`중권의 경우 병렬회로수 a = P = 4
<div class="fb0"><div class="fl">\\( I = \\dfrac{I_a}{a} = \\dfrac{20}{4} = 5\\;[\\text{A}] \\)</div></div>`},

{n:15,g:'gs',yr:'기사 13년 1회·16년 3회·17년 1회 / 산업 05년 1회·07년 2회·15년 1회',
 q:'6극 직류발전기의 정류자편수가 132, 단자전압이 220[V], 직렬도체수가 132개이고 중권이다. 정류자편간 전압[V]은?',
 o:['10','20','30','40'],ans:1,
 e:`<div class="fb0"><div class="fl">\\( e = \\dfrac{E}{K} \\times a = \\dfrac{220}{132} \\times 6 = 10\\;[\\text{V}] \\)</div></div>
E : 유기기전력[V] &nbsp; a = P : 병렬회로수 &nbsp; K : 정류자편수`},

{n:16,g:'s',yr:'산업 92년 2회',
 q:'4극의 직류발전기가 있다. 정류자 지름이 14.6[cm], 정류자편수가 92개, 브러시 두께 0.955[cm]로 매분 1150회전한다면 1개 코일의 정류주기[S]는?',
 o:['1.085×10⁻³','1.61×10⁻³','1.85×10⁻⁴','5.19×10⁻⁴'],ans:2,
 e:`<div class="fb0">
<div class="fl">\\( T_c = \\dfrac{2b - \\dfrac{\\pi D}{K}}{\\pi D \\cdot \\dfrac{N}{60}} \\)</div>
<div class="fl">\\( = \\dfrac{2 \\times 0.955 - \\dfrac{3.14 \\times 14.6}{92}}{3.14 \\times 14.6 \\times \\dfrac{1150}{60}} = 1.61 \\times 10^{-3}\\;[\\text{S}] \\)</div></div>
b : 브러시두께[m] &nbsp; D : 정류자지름[m] &nbsp; K : 정류자편수 &nbsp; N : 회전수[rpm]`},

{n:17,g:'s',yr:'산업 90년 7회',
 q:'전기자의 지름 D[m], 길이 l[m]인 전기자에 전기자권선을 감은 직류발전기가 있다. 자극의 수 P, 각 극의 자속수가 φ[Wb]일 때 전기자표면의 자속밀도[Wb/m²]는?',
 o:['\\(\\dfrac{\\pi DP}{60}\\)','\\(\\dfrac{P\\phi}{\\pi Dl}\\)','\\(\\dfrac{\\pi Dl}{P\\phi}\\)','\\(\\dfrac{\\pi Dl}{P}\\)'],ans:2,
 e:`<div class="fb0"><div class="fl">\\( B = \\dfrac{P\\phi}{\\pi Dl}\\;[\\text{Wb/m}^2] \\)</div></div>
P : 극수 &nbsp; D : 지름 &nbsp; φ : 극당자속`},

{n:18,g:'s',yr:'산업 99년 4회·02년 3회·04년 3회·05년 3회·07년 2회·11년 3회',
 q:'전기자 지름 0.2[m]의 직류발전기가 1.5[kW]의 출력에서 1800[rpm]으로 회전하고 있을 때 전기자 주변속도[m/sec]는?',
 o:['18.84','21.96','32.74','42.85'],ans:1,
 e:`<div class="fb0"><div class="fl">\\( v = \\pi D \\cdot \\dfrac{N}{60} = 3.14 \\times 0.2 \\times \\dfrac{1800}{60} = 18.84\\;[\\text{m/sec}] \\)</div></div>`},

{n:19,g:'s',yr:'산업 96년 4회·97년 2회·14년 3회(유사)',
 q:'자극수 4, 전기자도체수 400, 자극당 유효자속 0.01[Wb], 600[rpm]으로 회전하는 파권 직류발전기의 유기기전력[V]은?',
 o:['80','100','120','140'],ans:1,
 e:`파권의 경우 병렬회로수 a = 2
<div class="fb0"><div class="fl">\\( E = \\dfrac{PZ\\phi}{a} \\cdot \\dfrac{N}{60} = \\dfrac{4 \\times 400 \\times 0.01}{2} \\times \\dfrac{600}{60} = 80\\;[\\text{V}] \\)</div></div>`},

{n:20,g:'s',yr:'산업 91년 2회',
 q:'8극으로 된 직류 중권발전기의 자극의 자속이 0.025[Wb]이고, 전기자도체수가 500이다. 1200[rpm]으로 회전시킬 때 유기되는 기전력[V]은?',
 o:['100','150','200','250'],ans:4,
 e:`중권의 경우 병렬회로수 a = P = 8
<div class="fb0"><div class="fl">\\( E = \\dfrac{8 \\times 500 \\times 0.025}{8} \\times \\dfrac{1200}{60} = 250\\;[\\text{V}] \\)</div></div>`},

{n:24,g:'gs',yr:'기사 13년 2회 / 산업 95년 2회·96년 6회·99년 3회·05년 1·3회·07년 4회',
 q:'포화하고 있지 않은 직류발전기의 회전수가 1/2로 되었을 때 기전력을 전과 같은 값으로 하자면 여자전류를 얼마로 해야 하는가?',
 o:['1/2배','1배','2배','4배'],ans:3,
 e:`\\(E \\propto k\\phi N\\) 에서 E 일정할 때
<div class="fb0">
<div class="fl">\\( \\phi \\propto \\dfrac{1}{N} \\Rightarrow \\dfrac{1}{\\;\\tfrac{1}{2}\\;} = 2\\text{배} \\)</div></div>
여자전류 ∝ 자속이므로 <strong>2배</strong> 증가`},

{n:25,g:'s',yr:'산업 00년 6회·04년 2회·14년 1회',
 q:'브러시 홀더(brush holder)는 브러시를 정류자면의 적당한 위치에서 스프링에 의하여 항상 일정한 압력으로 정류자면에 접속하여야 한다. 가장 적당한 압력[kg/cm²]은?',
 o:['1~2','0.5~1','0.15~0.25','0.01~0.15'],ans:3,
 e:`<strong>브러시 홀더</strong> : 브러시를 정류자·슬립링에 적당한 압력으로 접촉시키는 장치<br>
적정 압력 : <strong>0.15 ~ 0.25 [kg/cm²]</strong>`},

{n:26,g:'gs',yr:'기사 93년 5회·17년 3회 / 산업 19년 2회(유사)',
 q:'전기자 총도체수 152, 4극, 파권인 직류발전기의 전기자전류 100[A]일 때 극당 감자기자력[AT/극]은? (단, 브러시의 이동각은 10°이다)',
 o:['33.6','52.8','105.6','211.2'],ans:3,
 e:`<div class="fb0">
<div class="fl">\\( F_d = \\dfrac{ZI_a}{2aP} \\times \\dfrac{2\\alpha}{180} \\)</div>

Z : 도체수 &nbsp; a : 병렬회로수(파권=2) &nbsp; α : 브러시 이동각`},

{n:27,g:'s',yr:'산업 98년 6회·00년 5회',
 q:'직류발전기에서 브러시간에 유기되는 기전력의 파형의 맥동을 방지하는 대책이 될 수 없는 것은?',
 o:['사구(skewed slot)를 채용할 것','갭의 길이를 균일하게 할 것','슬롯폭에 대하여 갭을 크게 할 것','정류자면수를 적게 할 것'],ans:4,
 e:`맥동을 줄이려면 <strong>정류자편수를 많이</strong> 설치해야 한다.<br>'적게 할 것'은 오히려 맥동을 증가시키므로 대책이 아니다.`},

{n:28,g:'g',yr:'기사 92년 5회·13년 3회·16년 1회',
 q:'직류기에서 전기자반작용이란 전기자권선에 흐르는 전류로 인하여 생긴 자속이 무엇에 영향을 주는 현상인가?',
 o:['모든 부분에 영향을 주는 현상','계자극에 영향을 주는 현상','감자작용만을 하는 현상','편자작용만을 하는 현상'],ans:2,
 e:`전기자권선의 전류에 의해 발생한 누설자속이 <strong>계자극의 주자속</strong>에 영향을 미쳐 자속의 분포를 변화시키는 현상`},

{n:29,g:'s',yr:'산업 91년 7회·94년 4회·06년 3회',
 q:'직류발전기의 전기자반작용을 설명함에 있어 그 영향을 없애는 데 가장 유효한 것은?',
 o:['균압환','탄소 브러시','보상권선','보극'],ans:3,
 e:`⊙ 보극 설치 (소극적 대책)<br>
⊙ <strong>보상권선</strong> 설치 (적극적 대책) ← 가장 유효<br>
⊙ 로커를 이용하여 브러시 이동`},

{n:32,g:'gs',yr:'기사 16년 2회 / 산업 91년 2회·01년 2·3회',
 q:'전기자반작용이 직류발전기에 영향을 주는 것을 설명한 것이다. 틀린 설명은?',
 o:['전기자중성축을 이동시킨다.','자속을 감소시켜 부하 시 전압강하의 원인이 된다.','정류자편간 전압이 불균일하게 되어 섬락의 원인이 된다.','전류의 파형은 찌그러지나 출력에는 변화가 없다.'],ans:4,
 e:`전기자반작용은 주자속을 감소시키므로 <strong>출력도 감소</strong>한다.<br>④ 출력도 변한다 → 틀린 설명`},

 e:`\\(E_a \\propto k'I_f N\\)
<div class="fb0">
<div class="fl">\\( k' = \\dfrac{E_a}{I_f N} = \\dfrac{120}{4 \\times 800} = 0.0375 \\)</div>
<div class="fl">\\( I_f = \\dfrac{E_a}{k' N} = \\dfrac{140}{0.0375 \\times 640} = 5.83\\;[\\text{A}] \\)</div></div>`},

{n:62,g:'s',yr:'산업 93년 5회·00년 2회·02년 2회·06년 1회',
 q:'25[kW], 125[V], 1200[rpm]의 타여자발전기가 있다. 전기자저항(브러시 포함)은 0.04[Ω]이다. 정격상태에서 속도를 200[rpm]으로 낮추었을 경우 부하전류[A]는? (단, 전기자반작용 무시, 전기자회로 및 부하저항 불변)',
 o:['33.3','200','1200','3125'],ans:1,
 e:`<div class="fb0">
<div class="fl">\\( I_n = \\dfrac{25000}{125} = 200\\;[\\text{A}] \\)</div>
<div class="fl">\\( E_{1200} = 125 + 200 \\times 0.04 = 133\\;[\\text{V}] \\)</div>
<div class="fl">\\( E_{200} = \\dfrac{200}{1200} \\times 133 = 22\\;[\\text{V}] \\)</div>
<div class="fl">\\( I_{200} = \\dfrac{22}{133} \\times 200 = 33.3\\;[\\text{A}] \\)</div></div>`},

{n:63,g:'s',yr:'산업 95년 7회·03년 1회·06년 2회·08년 2회',
 q:'25[kW], 125[V], 1200[rpm]의 직류 타여자발전기가 있다. 전기자저항(브러시 포함)은 0.4[Ω]이다. 정격상태에서 속도를 200[rpm]으로 낮추었다면 유기기전력은? (단, 정상상태에서 유기기전력을 E라 한다)',
 o:['\\(\\dfrac{1}{2}E\\)','\\(\\dfrac{1}{4}E\\)','\\(\\dfrac{1}{6}E\\)','\\(\\dfrac{1}{8}E\\)'],ans:3,
 e:`\\(E_a \\propto N\\)
<div class="fb0"><div class="fl">\\( E_{200} = \\dfrac{200}{1200} \\times E = \\dfrac{1}{6}E \\)</div></div>`},

{n:64,g:'s',yr:'산업 96년 2회·01년 1회',
 q:'유도기전력 110[V], 전기자저항 및 계자저항이 각각 0.05[Ω]인 직권발전기가 있다. 부하전류가 100[A]라 하면 단자전압[V]은?',
 o:['95','100','105','110'],ans:2,
 e:`<div class="fb0"><div class="fl">\\( V_n = E_a - I_a(r_a + r_s) = 110 - 100 \\times (0.05+0.05) = 100\\;[\\text{V}] \\)</div></div>`},

{n:65,g:'s',yr:'산업 93년 3회·09년 1회',
 q:'부하전류가 50[A]일 때 단자전압이 100[V]인 직류 직권발전기의 부하전류가 70[A]로 되면 단자전압은 몇 [V]가 되겠는가? (단, 전기자저항 및 직권계자권선의 저항 각각 0.10[Ω], 전기자반작용 등 무시)',
 o:['150','140','138','125'],ans:2,
 e:`<div class="fb0">
<div class="fl">\\( E_{50} = 100 + 50 \\times (0.1+0.1) = 110\\;[\\text{V}] \\)</div>
<div class="fl">\\( E_{70} = \\dfrac{70}{50} \\times 110 = 154\\;[\\text{V}] \\quad (E_a \\propto I_a) \\)</div>
<div class="fl">\\( V_{70} = 154 - 70 \\times 0.2 = 140\\;[\\text{V}] \\)</div></div>`},

{n:67,g:'gs',yr:'기사 94년 2회·15년 3회 / 산업 15년 1회·18년 2회(유사)',
 q:'정격전압 100[V], 정격전류 50[A]인 분권발전기의 유기기전력은 몇 [V]인가? (단, 전기자저항 0.2[Ω], 계자전류 및 전기자반작용은 무시한다)',
 o:['110','120','125','127.5'],ans:1,
 e:`계자전류 무시 → \\(I_a = I_n = 50\\;[\\text{A}]\\)
<div class="fb0"><div class="fl">\\( E_a = 100 + 50 \\times 0.2 = 110\\;[\\text{V}] \\)</div></div>`},

{n:68,g:'s',yr:'산업 92년 3회·00년 7회·07년·19년 1회(유사)',
 q:'전기자저항이 0.3[Ω]이며, 단자전압이 210[V], 부하전류가 95[A], 계자전류가 5[A]인 직류분권발전기의 유기기전력[V]은?',
 o:['180','230','240','250'],ans:3,
 e:`<div class="fb0">
<div class="fl">\\( I_a = I_f + I_n = 5 + 95 = 100\\;[\\text{A}] \\)</div>
<div class="fl">\\( E_a = V_n + I_a r_a = 210 + 100 \\times 0.3 = 240\\;[\\text{V}] \\)</div></div>`},

{n:69,g:'gs',yr:'기사 13년 3회·14년 1회(유사) / 산업 92년 7회·14년 1회(유사)',
 q:'정격속도로 회전하고 있는 무부하의 분권발전기가 있다. 계자저항이 40[Ω], 계자전류가 3[A], 전기자저항이 2[Ω]일 때 유기기전력은 얼마인가?',
 o:['114[V]','120[V]','126[V]','132[V]'],ans:3,
 e:`무부하 → \\(I_a = I_f = 3\\;[\\text{A}]\\)
<div class="fb0"><div class="fl">\\( E_a = I_f r_f + I_a r_a = 3 \\times 40 + 3 \\times 2 = 126\\;[\\text{V}] \\)</div></div>`},

{n:70,g:'gs',yr:'기사 19년 2회(유사) / 산업 90년 6회·98년 5회·00년 4회·01년 1회',
 q:'무부하전압 213[V], 단자전압 200[V], 정격출력 80[kW]의 분권발전기가 있다. 계자저항 20[Ω], 전부하 시 전기자반작용에 의한 전압강하가 4.8[V]라면 전기자회로의 저항[Ω]은?',
 o:['0.02','0.05','0.08','0.1'],ans:1,
 e:`<div class="fb0">
<div class="fl">\\( I_a = \\dfrac{P}{V_n} + \\dfrac{V_n}{r_f} = \\dfrac{80000}{200} + \\dfrac{200}{20} = 410\\;[\\text{A}] \\)</div>
<div class="fl">\\( r_a = \\dfrac{E_a - V_n - e_a}{I_a} = \\dfrac{213 - 200 - 4.8}{410} = 0.02\\;[\\Omega] \\)</div></div>`},

{n:73,g:'s',yr:'산업 93년 6회·97년 5회·12년 1회·16년 3회(유사)',
 q:'전기자저항이 0.05[Ω]인 직류분권발전기가 있다. 회전수 1000[rpm], 단자전압 220[V]일 때 전기자전류가 100[A]였다. 이것을 전동기로 사용하여 단자전압 및 전기자전류가 동일할 때 회전수[rpm]는? (단, 전기자반작용 무시)',
 o:['약 1046.5','약 977.8','약 977.3','약 955.5'],ans:4,
 e:`<div class="fb0">
<div class="fl">발전기 유기기전력 \\( E_a = 220 + 100 \\times 0.05 = 225\\;[\\text{V}] \\)</div>
<div class="fl">전동기 역기전력 \\( E_c = 220 - 100 \\times 0.05 = 215\\;[\\text{V}] \\)</div>
<div class="fl">\\( N_{전동기} = 1000 \\times \\dfrac{215}{225} = 955.5\\;[\\text{rpm}] \\)</div></div>`},

{n:74,g:'gs',yr:'기사 93년 2회·05년 2회 / 산업 14년 2회(유사)',
 q:'직류분권발전기의 무부하포화곡선이 \\(V = \\dfrac{940i_f}{33+i_f}\\) (if : 계자전류[A])로 주어질 때 계자저항이 20[Ω]이면 몇 [V]의 전압이 유기되는가?',
 o:['140','160','280','300'],ans:3,
 e:`<div class="fb0">
<div class="fl">\\( I_f \\times 20 = \\dfrac{940 I_f}{33 + I_f} \\)</div>
<div class="fl">\\( 20(33 + I_f) = 940 \\Rightarrow I_f = 14\\;[\\text{A}] \\)</div>
<div class="fl">\\( V = I_f \\times r_f = 14 \\times 20 = 280\\;[\\text{V}] \\)</div></div>`},

{n:75,g:'s',yr:'산업 04년 2회·07년 1회',
 q:'가동 복권발전기의 내부결선을 바꾸어 직권발전기로 사용하려면 어떻게 하는가?',
 o:['직권계자를 단락시킨다.','분권계자를 개방시킨다.','직권계자를 개방시킨다.','외분권 복권형으로 한다.'],ans:2,
 e:`⊙ 직권계자 단락 → 분권발전기<br>⊙ <strong>분권계자 개방 → 직권발전기</strong>`},

{n:76,g:'s',yr:'산업 94년 2회·02년 1회·02년 4회',
 q:'가동 복권발전기의 내부결선을 바꾸어 분권발전기로 하자면 어떻게 하는가?',

 e:`⊙ <strong>직권계자 단락 → 분권발전기</strong><br>⊙ 분권계자 개방 → 직권발전기`},

{n:77,g:'gs',yr:'기사 94년 5회 / 산업 94년 5회',
 q:'정격 220[V], 95[kW]의 내분권 가동 복권발전기가 있다. 정격전압에서 부하전류가 40[A]일 때 유기기전력은? (단, 전기자저항 rₐ = 0.1[Ω], 직권계자저항 rₛ = 0.05[Ω], 분권계자저항 r_f = 55.5[Ω], 전기자반작용 무시)',
 o:['225.5[V]','226.4[V]','227.3[V]','228.5[V]'],ans:2,
 e:`<div class="fb0">
<div class="fl">\\( V_n' = V_n + r_s \\cdot I_n = 220 + 0.05 \\times 40 = 222\\;[\\text{V}] \\)</div>
<div class="fl">\\( I_f = \\dfrac{V_n'}{r_f} = \\dfrac{222}{55.5} = 4\\;[\\text{A}] \\)</div>
<div class="fl">\\( I_a = I_f + I_n = 4 + 40 = 44\\;[\\text{A}] \\)</div>
<div class="fl">\\( E_a = V_n' + r_a \\cdot I_a = 222 + 0.1 \\times 44 = 226.4\\;[\\text{V}] \\)</div></div>`},

{n:78,g:'s',yr:'산업 98년 4회',
 q:'전기자권선의 저항 0.08[Ω], 직권계자권선 및 분권계자회로의 저항이 각각 0.07[Ω]과 100[Ω]인 외분권 가동 복권발전기의 부하전류가 18[A]일 때, 단자전압이 V = 200[V]라면 유기기전력[V]은? (단, 전기자반작용과 브러시 접촉저항은 무시한다)',
 o:['201.5','203','205.4','207'],ans:2,
 e:`외분권이므로 정격전압 = 분권계자 전압 → \\(V_n = I_f \\cdot r_f\\)
<div class="fb0">
<div class="fl">\\( I_f = \\dfrac{V_n}{r_f} = \\dfrac{200}{100} = 2\\;[\\text{A}] \\)</div>
<div class="fl">\\( I_a = I_f + I_n = 2 + 18 = 20\\;[\\text{A}] \\)</div>
<div class="fl">\\( E_a = V_n + I_a(r_a + r_s) = 200 + 20 \\times (0.08+0.07) = 203\\;[\\text{V}] \\)</div></div>`},

{n:79,g:'s',yr:'산업 91년 6회·98년 7회·00년 6회',
 q:'무부하전압 250[V], 정격전압 210[V]인 발전기의 전압변동률[%]은?',

\\(V_0\\) : 무부하전압 &nbsp; \\(V_n\\) : 정격전압`},

{n:80,g:'s',yr:'산업 93년 4회·97년 2회·01년 1회·03년 4회',
 q:'무부하 때 119[V]인 분권발전기가 6[%]의 전압변동률을 가지고 있다고 한다. 전부하 단자전압은 몇 [V]인가?',
 o:['105.1','112.2','125.6','145.2'],ans:2,

/* ─── render ─── */
function rk(s){
  const d=document.createElement('div');
  d.innerHTML=s;
  renderMathInElement(d,{delimiters:[{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],throwOnError:false});
  return d.innerHTML;
}

function mk(q){
  const id='q'+q.n;
  const tg=q.g.split('').map(c=>c==='g'?'<span class="tg tg-g">기사</span>':'<span class="tg tg-s">산업기사</span>').join('');
  const opts=q.o.map((o,i)=>`<div class="opt" id="${id}_o${i+1}" onclick="sel('${id}',${i+1},${q.ans})"><span class="on">${N[i]}</span><span>${rk(o)}</span></div>`).join('');
  const sv=q.svg?`<div class="gw" style="padding:10px 15px 4px 57px">${q.svg}</div>`:'';
  return `<div class="card" id="${id}" data-g="${q.g}" data-n="${q.n}">
<div class="ch" onclick="tog('${id}')">
  <div class="cn">${String(q.n).padStart(2,'0')}</div>
  <div class="ct">
    <div class="tags">${tg}<span class="tg tg-yr">${q.yr}</span></div>
    <div class="qt">${rk(q.q)}</div>
  </div>
  <div class="arr">▼</div>
</div>
${sv}
<div class="opts" id="${id}_opts">${opts}</div>
<div class="cbody">
  <div class="abar">
    <button class="rtbtn" onclick="reset('${id}')">↺ 다시풀기</button>
    <span class="rmsg" id="${id}_m"></span>
  </div>
  <div class="ansbar"><span class="albl">정답</span><span class="aval">${N[q.ans-1]} ${rk(q.o[q.ans-1])}</span></div>
  <div class="expl">${rk(q.e)}</div>
</div>
</div>`;
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('main').innerHTML=QS.map(mk).join('');
  upBdg();
});

/* ─── interaction ─── */
function tog(id){document.getElementById(id).classList.toggle('open');}
function sel(id,n,ans){
  const os=document.querySelectorAll(`#${id}_opts .opt`);
  if(os[0].classList.contains('lk'))return;
  os.forEach(o=>o.classList.add('lk'));
  if(n===ans){
    document.getElementById(`${id}_o${ans}`).classList.add('cor');
  }else{
    document.getElementById(`${id}_o${n}`).classList.add('wrg');
    document.getElementById(`${id}_o${ans}`).classList.add('cor');
  }
  const m=document.getElementById(`${id}_m`);
  if(n===ans){m.textContent='✓ 정답!';m.className='rmsg ok';}
  else{m.textContent='✗ 오답';m.className='rmsg ng';}
  document.getElementById(id).classList.add('open');
}
function reset(id){
  document.querySelectorAll(`#${id}_opts .opt`).forEach(o=>o.className='opt');
  document.getElementById(`${id}_m`).textContent='';
  document.getElementById(id).classList.remove('open');
}
function fAll(b){
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  document.querySelectorAll('.card').forEach(c=>c.style.display='');upBdg();
}
function fTag(t,b){
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  document.querySelectorAll('.card').forEach(c=>c.style.display=c.dataset.g&&c.dataset.g.includes(t)?'':'none');upBdg();
}
function doSearch(){
  const v=document.getElementById('si').value.toLowerCase();
  document.querySelectorAll('.card').forEach(c=>c.style.display=(!v||c.innerText.toLowerCase().includes(v)||c.dataset.n===v)?'':'none');upBdg();
}
function upBdg(){document.getElementById('bdg').textContent=document.querySelectorAll('.card:not([style*="none"])').length+'문제';}
</script>
