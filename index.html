<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전력공학 기출문제</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;--accent:#4f7fff;--accent2:#7c5cfc;--correct:#22c55e;--wrong:#ef4444;--text:#e8eaf6;--text2:#8b91b3;--yellow:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh}
.header{background:linear-gradient(135deg,#0f1117,#1a1d27);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:11px;color:var(--text2);margin-top:2px}
.stats-bar{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.stat{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px}
.stat span{color:var(--text);font-weight:700;font-family:'JetBrains Mono',monospace}
.tabs{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .2s;white-space:nowrap}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tab:hover:not(.active){border-color:var(--accent);color:var(--text)}
.review-bar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:rgba(239,68,68,.06);border-bottom:1px solid rgba(239,68,68,.2);flex-wrap:wrap}
.review-label{font-size:13px;font-weight:700;color:var(--wrong)}
.review-count{font-size:12px;color:var(--text2)}
.review-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.review-btn-start{background:var(--wrong);color:#fff}
.review-btn-start:hover{background:#dc2626}
.review-btn-start:disabled{opacity:.4;cursor:default}
.review-btn-exit{background:transparent;border:1px solid var(--wrong)!important;color:var(--wrong);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.review-btn-exit:hover{background:rgba(239,68,68,.1)}
.shuffle-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;border:1px solid var(--accent2);color:var(--accent2);font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.shuffle-btn:hover{background:rgba(124,92,252,.15)}
.main{padding:16px 20px;max-width:900px;margin:0 auto}
.chapter-heading{font-size:13px;font-weight:700;color:var(--accent2);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.progress-wrap{margin-bottom:16px}
.progress-bar-bg{background:var(--surface2);border-radius:4px;height:5px;overflow:hidden}
.progress-bar{background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;border-radius:4px;transition:width .3s}
.progress-text{font-size:11px;color:var(--text2);margin-top:3px;font-family:'JetBrains Mono',monospace}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px;transition:border-color .2s}
.q-card:hover{border-color:#3e4470}
.q-card.answered-correct{border-color:var(--correct)}
.q-card.answered-wrong{border-color:var(--wrong)}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.q-num{background:var(--accent);color:#fff;font-size:11px;font-weight:900;padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace}
.q-stars{color:var(--yellow);font-size:11px}
.q-source{font-size:10px;color:var(--text2)}
.q-text{font-size:14px;font-weight:700;line-height:1.6;margin-bottom:12px}
.options{display:flex;flex-direction:column;gap:7px}
.option{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:13px;line-height:1.5;background:var(--surface2);transition:all .15s;user-select:none}
.option:hover:not(.disabled){border-color:var(--accent);background:#1e2540}
.option.correct{border-color:var(--correct);background:rgba(34,197,94,.1);color:#4ade80}
.option.wrong{border-color:var(--wrong);background:rgba(239,68,68,.1);color:#f87171}
.option.show-correct{border-color:var(--correct);background:rgba(34,197,94,.08)}
.option.disabled{cursor:default}
.opt-label{font-weight:900;font-family:'JetBrains Mono',monospace;font-size:12px;min-width:16px;margin-top:1px;flex-shrink:0}
.opt-content{flex:1}
.explanation{display:none;margin-top:12px;background:var(--surface2);border-radius:8px;padding:13px;border-left:3px solid var(--accent2);font-size:12px;line-height:1.7;color:var(--text2)}
.explanation.show{display:block}
.explanation strong{color:var(--text);font-weight:700}
.answer-line{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--correct)}
.reset-btn{display:none;margin-top:8px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.reset-btn.show{display:inline-block}
.reset-btn:hover{border-color:var(--accent2);color:var(--text)}
.chapter-section{display:none}
.chapter-section.active{display:block}
.formula{font-family:'JetBrains Mono',monospace;background:var(--bg);padding:2px 5px;border-radius:4px;font-size:11px;color:#a5f3fc}
.review-progress-banner{display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--text2)}
.review-progress-banner.show{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.review-progress-banner strong{color:var(--wrong)}
.celebrate-banner{display:none;text-align:center;padding:22px 16px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);border-radius:12px;margin-bottom:16px;font-size:14px;font-weight:700;color:var(--correct)}
.celebrate-banner.show{display:block}
body.review-mode .chapter-section.active .q-card{display:none}
body.review-mode .chapter-section.active .q-card.in-review{display:block}
/* 2열 options */
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.options-grid .option{flex-direction:column;align-items:flex-start}
</style>
</head>
<body>
<div class="header">
  <h1>⚡ 전력공학 기출문제</h1>
  <div class="header-sub">단원별 자주 출제되는 기출문제 · 정답 및 해설 포함</div>
  <div class="stats-bar">
    <div class="stat">전체 <span id="total-count">74</span>문제</div>
    <div class="stat">풀이 <span id="answered-count">0</span>문제</div>
    <div class="stat">정답 <span id="correct-count">0</span>문제</div>
    <div class="stat">정답률 <span id="accuracy">0</span>%</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showChapter('ch01',this)">CH01 전력계통 (17)</div>
  <div class="tab" onclick="showChapter('ch02',this)">CH02 전선로 (57)</div>
</div>

<div class="review-bar">
  <span class="review-label">🔴 오답 복습</span>
  <span class="review-count">틀린 문제: <b id="wrong-count">0</b>개</span>
  <button class="review-btn review-btn-start" id="btn-start-review" onclick="startReviewMode()" disabled>틀린 문제만 다시 풀기</button>
  <span id="btn-exit-review" onclick="exitReviewMode()" style="display:none;padding:5px 12px;border-radius:20px;border:1px solid var(--wrong);color:var(--wrong);font-size:12px;font-weight:700;cursor:pointer">✕ 복습 종료</span>
  <span id="review-round-label" style="display:none;font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace"></span>
  <button class="shuffle-btn" onclick="shuffleAll()">🔀 순서 섞기</button>
</div>

<div class="main">
  <div class="chapter-section active" id="ch01">
    <div class="chapter-heading">Chapter 01. 전력계통</div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="prog-ch01" style="width:0%"></div></div>
      <div class="progress-text" id="prog-text-ch01">0 / 17</div>
    </div>
    <div id="ch01-questions"></div>
  </div>
  <div class="chapter-section" id="ch02">
    <div class="chapter-heading">Chapter 02. 전선로</div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="prog-ch02" style="width:0%"></div></div>
      <div class="progress-text" id="prog-text-ch02">0 / 57</div>
    </div>
    <div id="ch02-questions"></div>
  </div>
</div>

<script>
// ── SVG helpers ──────────────────────────────────────────────────
function frac(n,d,col='#e8eaf6',sz=14){
  const w=Math.max(n.length,d.length)*sz*0.62+8;
  return `<svg viewBox="0 0 ${w+4} 44" width="${w+4}" height="44" font-family="serif" font-size="${sz}" style="vertical-align:middle;overflow:visible"><text x="${(w-n.length*sz*0.6)/2}" y="16" fill="${col}" font-style="italic">${n}</text><line x1="0" y1="20" x2="${w}" y2="20" stroke="${col}" stroke-width="1.2"/><text x="${(w-d.length*sz*0.6)/2}" y="36" fill="${col}" font-style="italic">${d}</text></svg>`;
}
function sqrt(inner,col='#e8eaf6',w=100,h=38){
  return `<svg viewBox="0 0 ${w+14} ${h+4}" width="${w+14}" height="${h+4}" font-family="serif" font-size="15" style="vertical-align:middle;overflow:visible"><polyline points="2,${h-4} 7,${h+2} 12,6 ${w+12},6" fill="none" stroke="${col}" stroke-width="1.5"/><foreignObject x="16" y="0" width="${w}" height="${h+4}"><div xmlns="http://www.w3.org/1999/xhtml" style="color:${col};font-family:serif;font-size:13px;line-height:${h+4}px;padding-top:${(h-16)/2}px">${inner}</div></foreignObject></svg>`;
}
// Inline frac inside text: fracI(n,d) returns HTML
function fracI(n,d){
  return `<span style="display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;line-height:1;margin:0 2px"><span style="font-size:11px;border-bottom:1px solid currentColor;padding:0 2px;font-style:italic">${n}</span><span style="font-size:11px;padding:0 2px;font-style:italic">${d}</span></span>`;
}
// sqrt with HTML content
function sqrtH(inner,col='#e8eaf6'){
  return `<span style="display:inline-flex;align-items:center;gap:2px;color:${col}"><svg width="14" height="18" viewBox="0 0 14 18" style="flex-shrink:0"><polyline points="1,13 4,17 7,2 13,2" fill="none" stroke="${col}" stroke-width="1.5"/></svg><span style="border-top:1.5px solid ${col};padding:2px 4px;font-style:italic;font-family:serif;font-size:13px">${inner}</span></span>`;
}
// sup
function sup(base,exp){return `${base}<sup style="font-size:10px">${exp}</sup>`;}

// ── Question data ─────────────────────────────────────────────────
// Each question: {id, stars, source, text, imgAbove(opt), opts:[{text,svg}], answer(1-based), exp}
// answer = index in ORIGINAL opts array (1-based)

const QUESTIONS = {
  ch01: [
    {
      id:'01', stars:'★★★★', source:'산업 94년 2회, 96년 6회, 00년 3회, 04년 2회, 15년 1회, 17년 3회',
      text:'우리나라의 배전방식으로 가장 많이 사용되고 있는 것은?',
      opts:['단상 2선식','3상 3선식','3상 4선식','2상 4선식'], answer:3,
      exp:`<div class="answer-line">✓ 정답: 3상 4선식</div>우리나라에서는 <strong>3상 4선식</strong>을 대표적인 배전방식으로 사용한다.<br>㉠ 다른 배전방식에 비해 큰 전력을 공급할 수 있다.<br>㉡ 선로사고 시 사고검출이 용이하다.<br>㉢ 3상 부하 및 단상 부하에 동시전력을 공급할 수 있다.`
    },
    {
      id:'02', stars:'★★★', source:'산업 95년 4회, 99년 3회, 01년 2회',
      text:'변전소의 설치목적이 아닌 것은?',
      opts:['경제적인 이유에서 전압을 승압 또는 강압한다.','발전전력은 집중연계한다.','수용가에 배분하고 정전을 최소화한다.','전력의 발생과 계통의 주파수를 변환시킨다.'], answer:4,
      exp:`<div class="answer-line">✓ 정답: 전력의 발생과 계통의 주파수를 변환시킨다.</div>변전소는 전압을 승압 또는 강압하는 곳으로, 계통을 연계하고 조류를 제어한다.<br><strong>주파수 변환</strong>은 변전소의 설치목적이 아니다.`
    },
    {
      id:'03', stars:'★★', source:'기사 15년 1회, 산업 03년 1회, 14년 3회',
      text:'전력계통의 전압을 조정하는 가장 보편적인 방법은?',
      opts:['발전기의 유효전력 조정','부하의 유효전력 조정','계통의 주파수 조정','계통의 무효전력 조정'], answer:4,
      exp:`<div class="answer-line">✓ 정답: 계통의 무효전력 조정</div>조상설비를 이용하여 <strong>무효전력을 조정</strong>하여 전압을 조정한다.`
    },
    {
      id:'04', stars:'★', source:'기사 93년 4회',
      text:'전력계통의 전압조정과 무관한 것은?',
      opts:['발전기의 조속기(governor)','발전기의 전압조정장치','전력용 콘덴서','분로 리액터(shunt reactor)'], answer:1,
      exp:`<div class="answer-line">✓ 정답: 발전기의 조속기(governor)</div><strong>조속기(governor)</strong>는 부하변동에 따른 원동기의 회전속도를 일정하게 유지하기 위한 장치로, 전압조정과는 무관하다.<br>전압조정 설비: 전력용 콘덴서, 분로 리액터, 발전기의 전압조정장치 등`
    },
    {
      id:'05', stars:'★★★★★', source:'기사 92년 3회, 11년 2회, 산업 05년 1회, 07년 2회, 12년 3회, 14년 1회',
      text:'전송전력이 400[MW], 송전거리가 200[km]인 경우의 경제적인 송전전압은 약 몇 [kV]인가? (단, Still의 식에 의하여 산정한다)',
      opts:['57','173','353','645'], answer:3,
      exp:`<div class="answer-line">✓ 정답: 353[kV]</div><strong>Still의 경제적 송전전압 공식:</strong><br>
<svg viewBox="0 0 310 52" width="300" height="52" font-family="serif" font-size="15" style="display:block;margin:8px 0;overflow:visible">
<text x="2" y="22" fill="#e8eaf6">E = 5.5</text>
<polyline points="62,22 68,30 74,6 306,6" fill="none" stroke="#a5f3fc" stroke-width="1.5"/>
<text x="78" y="22" fill="#a5f3fc">0.6</text><text x="101" y="22" fill="#a5f3fc" font-style="italic">l</text><text x="110" y="22" fill="#a5f3fc"> + </text>
<text x="130" y="14" fill="#a5f3fc" font-style="italic">P</text><line x1="128" y1="18" x2="156" y2="18" stroke="#a5f3fc" stroke-width="1.2"/><text x="128" y="32" fill="#a5f3fc" font-size="12">100</text>
<text x="160" y="22" fill="#e8eaf6"> [kV]</text>
</svg>
여기서 <em>l</em>: 송전거리[km], <em>P</em>: 송전전력[kW]<br><br>
E = 5.5√(0.6×200 + 400000/100) = 5.5√4120 = 5.5×64.2 ≈ <strong>353[kV]</strong>`
    },
    {
      id:'06', stars:'★', source:'산업 03년 3회, 18년 2회',
      text:'우리나라에서 현재 사용되고 있는 송전전압에 해당되는 것은?',
      opts:['150[kV]','220[kV]','345[kV]','500[kV]'], answer:3,
      exp:`<div class="answer-line">✓ 정답: 345[kV]</div>우리나라 표준 송전전압: 22,000 / 66,000 / 154,000 / <strong>220,000 / 275,000 / 345,000 / 765,000[V]</strong><br>보기 중 해당되는 것은 345[kV]이다.`
    },
    {
      id:'07', stars:'★★★', source:'산업 01년 1회, 14년 1회',
      text:'3상 송전선로의 공칭전압이란?',
      opts:['그 전선로를 대표하는 최고 전압','그 전선로를 대표하는 평균전압','그 전선로를 대표하는 선간전압','그 전선로를 대표하는 상전압'], answer:3,
      exp:`<div class="answer-line">✓ 정답: 그 전선로를 대표하는 선간전압</div>공칭전압이란 KSC 0501에 의해 송전선로의 전압은 <strong>선간전압</strong>으로 표기한다.`
    },
    {
      id:'08', stars:'★★', source:'기사 95년 5회',
      text:'다음 중 우리나라에서 사용하는 공칭전압에서 22000/38000의 의미는?',
      opts:['접지전압/비접지전압','비접지전압/접지전압','선간전압/상전압','상전압/선간전압'], answer:4,
      exp:`<div class="answer-line">✓ 정답: 상전압/선간전압</div>Y결선 기준으로: <strong>선간전압 = √3 × 상전압</strong><br>22,000 × √3 = 38,000[V]<br>따라서 22000은 상전압, 38000은 선간전압이다.`
    },
    {
      id:'09', stars:'★', source:'산업 92년 6회',
      text:'공칭전압은 그 선로를 대표하는 선간전압을 말하고, 최고 전압은 정상운전 시 선로에 발생하는 최고의 선간전압을 나타낸다. 다음 표에서 공칭전압에 대한 최고 전압이 옳은 것은?',
      opts:['3.3/5.7Y → 최고전압 3.5/6.0Y','6.6/11.4Y → 최고전압 6.9/11.9Y','13.2/22.9Y → 최고전압 13.5/25.8Y','22/38Y → 최고전압 25/45Y'], answer:3,
      exp:`<div class="answer-line">✓ 정답: 13.2/22.9Y → 최고전압 13.5/25.8Y</div>공칭전압과 계통 최고 전압의 관계표:<br>공칭[kV]: 3.3 / 6.6 / 22.9 / 66 / 154 / 345 / 765<br>최고[kV]: 3.6 / 7.2 / <strong>25.8</strong> / 72.5 / 170 / 362 / 800`
    },
    {

// ── Shuffle utilities ─────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ── State ─────────────────────────────────────────────────────────
let stats = {answered:0, correct:0};
// qid -> {answered, wasCorrect, wrongCount, shuffledOrder:[0-based original indices]}
let questionStates = {};
// Rendered question order for each chapter
let qOrder = {ch01:[], ch02:[]};
// Shuffled option order for each question: qid -> [originalIndex, ...]
let optOrder = {};

const CH01_IDS = QUESTIONS.ch01.map(q=>q.id);
const CH02_IDS = QUESTIONS.ch02.map(q=>q.id);
const ALL_IDS = [...CH01_IDS, ...CH02_IDS];

// ── Render ─────────────────────────────────────────────────────────
function renderQuestions(chapter, order) {
  const container = document.getElementById(chapter+'-questions');
  container.innerHTML = '';
  const questions = QUESTIONS[chapter];
  order.forEach((qIdx, displayIdx) => {
    const q = questions[qIdx];
    container.appendChild(buildCard(q, displayIdx+1));
  });
}

function buildCard(q, displayNum) {
  const div = document.createElement('div');
  div.className = 'q-card';
  div.id = 'qc-'+q.id;

  // Get or create shuffled option order
  if (!optOrder[q.id]) {
    optOrder[q.id] = shuffle([...Array(q.opts.length).keys()]);
  }
  const oOrder = optOrder[q.id];
  const labels = ['①','②','③','④','⑤'];

  // Find which display position the correct answer is now in
  const correctOrigIdx = q.answer - 1; // 0-based
  const correctDisplayIdx = oOrder.indexOf(correctOrigIdx); // 0-based display position

  const isSvgOpts = q.svgOpts != null;
  const gridClass = isSvgOpts ? 'options options-grid' : 'options';

  let optsHtml = '';
  oOrder.forEach((origIdx, dispIdx) => {
    const content = isSvgOpts ? q.svgOpts[origIdx] : q.opts[origIdx];
    optsHtml += `<div class="option" onclick="selectOption(this,'${q.id}',${dispIdx})" data-orig="${origIdx}">
      <span class="opt-label">${labels[dispIdx]}</span>
      <span class="opt-content">${content}</span>
    </div>`;
  });

  div.innerHTML = `
    <div class="q-meta">
      <span class="q-num">${String(displayNum).padStart(2,'0')}</span>
      <span class="q-stars">${q.stars}</span>
      <span class="q-source">${q.source}</span>
    </div>
    <div class="q-text">${q.text}</div>
    ${q.imgAbove||''}
    <div class="${gridClass}" id="opts-${q.id}">${optsHtml}</div>
    <div class="explanation" id="exp-${q.id}">${q.exp}</div>
    <button class="reset-btn" id="rst-${q.id}" onclick="resetQuestion('${q.id}')">↺ 다시 풀기</button>
  `;

  // Re-apply answered state if exists
  const st = questionStates[q.id];
  if (st && st.answered) {
    restoreCardState(div, q, st, oOrder, correctDisplayIdx);
  }
  return div;
}

function restoreCardState(div, q, st, oOrder, correctDisplayIdx) {
  const options = div.querySelectorAll('.option');
  options.forEach(o => o.classList.add('disabled'));
  if (st.wasCorrect) {
    options[st.selectedDisplayIdx].classList.add('correct');
    div.classList.add('answered-correct');
  } else {
    options[st.selectedDisplayIdx].classList.add('wrong');
    options[correctDisplayIdx].classList.add('show-correct');
    div.classList.add('answered-wrong');
  }
  div.querySelector('.explanation').classList.add('show');
  div.querySelector('.reset-btn').classList.add('show');
}

// ── Answer logic ──────────────────────────────────────────────────
function selectOption(el, qid, displayIdx) {
  const st = questionStates[qid];
  if (st && st.answered) return;

  const card = document.getElementById('qc-'+qid);
  const options = card.querySelectorAll('.option');

  // Find which original index this display option corresponds to
  const oOrder = optOrder[qid];
  const q = findQ(qid);
  const correctOrigIdx = q.answer - 1;
  const correctDisplayIdx = oOrder.indexOf(correctOrigIdx);
  const isCorrect = (displayIdx === correctDisplayIdx);

  options.forEach(o => o.classList.add('disabled'));
  el.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) options[correctDisplayIdx].classList.add('show-correct');

  card.querySelector('.explanation').classList.add('show');
  card.querySelector('.reset-btn').classList.add('show');
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  const prev = questionStates[qid] || {answered:false, wrongCount:0};
  questionStates[qid] = {
    answered: true,
    wasCorrect: isCorrect,
    selectedDisplayIdx: displayIdx,
    wrongCount: isCorrect ? (prev.wrongCount||0) : (prev.wrongCount||0)+1
  };

  if (!prev.answered) {
    stats.answered++;
    if (isCorrect) stats.correct++;
  } else {
    if (!prev.wasCorrect && isCorrect) stats.correct++;
    else if (prev.wasCorrect && !isCorrect) stats.correct--;
  }

  if (!isCorrect) card.classList.add('wrong-flag');
  else card.classList.remove('wrong-flag');

  updateStats(); updateProgress(); updateReviewBar();
  if (reviewMode) checkReviewComplete();
}

function resetQuestion(qid) {
  const card = document.getElementById('qc-'+qid);
  if (!card) return;
  const options = card.querySelectorAll('.option');
  options.forEach(o => o.classList.remove('disabled','correct','wrong','show-correct'));
  card.querySelector('.explanation').classList.remove('show');
  card.querySelector('.reset-btn').classList.remove('show');
  card.classList.remove('answered-correct','answered-wrong','wrong-flag');

  const prev = questionStates[qid]||{};
  if (prev.answered) {
    stats.answered--;
    if (prev.wasCorrect) stats.correct--;
  }
  questionStates[qid] = {answered:false, wrongCount: prev.wrongCount||0};
  updateStats(); updateProgress(); updateReviewBar();
}

function findQ(qid) {
  return [...QUESTIONS.ch01,...QUESTIONS.ch02].find(q=>q.id===qid);
}

// ── Shuffle all ───────────────────────────────────────────────────
function shuffleAll() {
  // Shuffle question order
  qOrder.ch01 = shuffle([...Array(QUESTIONS.ch01.length).keys()]);
  qOrder.ch02 = shuffle([...Array(QUESTIONS.ch02.length).keys()]);
  // Shuffle option order for every question
  ALL_IDS.forEach(id => {
    const q = findQ(id);
    optOrder[id] = shuffle([...Array(q.opts.length).keys()]);
  });
  // Re-render
  renderQuestions('ch01', qOrder.ch01);
  renderQuestions('ch02', qOrder.ch02);
}

// ── Review mode ───────────────────────────────────────────────────
let reviewMode = false;
let reviewRound = 0;

function getWrongIds() {
  return ALL_IDS.filter(id => {
    const s = questionStates[id];
    return s && s.answered && !s.wasCorrect;
  });
}

function updateReviewBar() {
  const wrongIds = getWrongIds();
  document.getElementById('wrong-count').textContent = wrongIds.length;
  const btn = document.getElementById('btn-start-review');
  btn.disabled = wrongIds.length===0;
  btn.textContent = reviewMode
    ? `🔁 다음 라운드 (${wrongIds.length}개)`
    : `틀린 문제만 다시 풀기 (${wrongIds.length}개)`;
}

function startReviewMode() {
  const wrongIds = getWrongIds();
  if (!wrongIds.length) return;
  reviewMode = true;
  reviewRound++;

  // Shuffle option order for wrong questions
  wrongIds.forEach(qid => {
    const q = findQ(qid);
    optOrder[qid] = shuffle([...Array(q.opts.length).keys()]);
    const card = document.getElementById('qc-'+qid);
    if (card) {
      const options = card.querySelectorAll('.option');
      options.forEach(o=>o.classList.remove('disabled','correct','wrong','show-correct'));
      card.querySelector('.explanation').classList.remove('show');
      card.querySelector('.reset-btn').classList.remove('show');
      card.classList.remove('answered-correct','answered-wrong','wrong-flag');
      card.classList.add('in-review');
      // Re-render options with new shuffle
      const labels=['①','②','③','④','⑤'];
      const isSvgOpts = q.svgOpts!=null;
      const oOrder = optOrder[qid];
      let optsHtml='';
      oOrder.forEach((origIdx,dispIdx)=>{
        const content = isSvgOpts ? q.svgOpts[origIdx] : q.opts[origIdx];
        optsHtml+=`<div class="option" onclick="selectOption(this,'${qid}',${dispIdx})" data-orig="${origIdx}">
          <span class="opt-label">${labels[dispIdx]}</span>
          <span class="opt-content">${content}</span>
        </div>`;
      });
      card.querySelector('#opts-'+qid).innerHTML = optsHtml;

      const prev = questionStates[qid]||{};
      stats.answered--;
      questionStates[qid]={answered:false, wrongCount:prev.wrongCount||0};
    }
  });

  ALL_IDS.forEach(id=>{
    if (!wrongIds.includes(id)) {
      const card=document.getElementById('qc-'+id);
      if(card) card.classList.remove('in-review');
    }
  });

  document.body.classList.add('review-mode');
  document.getElementById('btn-exit-review').style.display='inline-block';
  const rl=document.getElementById('review-round-label');
  rl.style.display='inline'; rl.textContent=`라운드 ${reviewRound} · ${wrongIds.length}문제`;

  // Switch to chapter with first wrong question
  const firstWrong = wrongIds[0];
  const targetCh = CH01_IDS.includes(firstWrong)?'ch01':'ch02';
  _switchChapter(targetCh);
  showReviewBanner(wrongIds.length, wrongIds.length);
  updateStats(); updateProgress(); updateReviewBar();
  setTimeout(()=>{
    const card=document.getElementById('qc-'+wrongIds[0]);
    if(card) card.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function exitReviewMode() {
  reviewMode = false;
  ALL_IDS.forEach(id=>{
    const card=document.getElementById('qc-'+id);
    if(card) card.classList.remove('in-review');
  });
  document.body.classList.remove('review-mode');
  document.getElementById('btn-exit-review').style.display='none';
  document.getElementById('review-round-label').style.display='none';
  hideReviewBanner();
  updateReviewBar();
}

function checkReviewComplete() {
  const reviewIds = ALL_IDS.filter(id=>{
    const card=document.getElementById('qc-'+id);
    return card && card.classList.contains('in-review');
  });
  const remaining = reviewIds.filter(id=>{
    const s=questionStates[id];
    return !s||!s.answered||!s.wasCorrect;
  });
  updateReviewBanner(reviewIds.length, remaining.length);
  if (remaining.length===0&&reviewIds.length>0) showCelebration();
}

let bannerEl=null;
function ensureBanner(){
  if(!bannerEl){bannerEl=document.createElement('div');bannerEl.className='review-progress-banner';bannerEl.id='review-banner';document.querySelector('.main').prepend(bannerEl);}
  return bannerEl;
}
function showReviewBanner(total,rem){const b=ensureBanner();b.innerHTML=`🔴 <strong>오답 복습 라운드 ${reviewRound}</strong> &nbsp;·&nbsp; 남은 문제: <strong style="color:var(--wrong)">${rem}</strong> / ${total}`;b.classList.add('show');}
function updateReviewBanner(total,rem){const b=document.getElementById('review-banner');if(b)b.innerHTML=`🔴 <strong>오답 복습 라운드 ${reviewRound}</strong> &nbsp;·&nbsp; 남은 문제: <strong style="color:var(--wrong)">${rem}</strong> / ${total}`;}
function hideReviewBanner(){const b=document.getElementById('review-banner');if(b)b.classList.remove('show');}
function showCelebration(){
  let cel=document.getElementById('celebrate-el');
  if(!cel){cel=document.createElement('div');cel.id='celebrate-el';cel.className='celebrate-banner';document.querySelector('.main').prepend(cel);}

  cel.classList.add('show');
  setTimeout(()=>cel.classList.remove('show'),4000);
}

// ── Stats & Progress ──────────────────────────────────────────────
function updateStats(){
  document.getElementById('answered-count').textContent=stats.answered;
  document.getElementById('correct-count').textContent=stats.correct;
  const acc=stats.answered>0?Math.round(stats.correct/stats.answered*100):0;
  document.getElementById('accuracy').textContent=acc;
}
function updateProgress(){
  let d1=0; CH01_IDS.forEach(id=>{if(questionStates[id]&&questionStates[id].answered)d1++;});
  document.getElementById('prog-ch01').style.width=(d1/17*100)+'%';
  document.getElementById('prog-text-ch01').textContent=d1+' / 17';
  let d2=0; CH02_IDS.forEach(id=>{if(questionStates[id]&&questionStates[id].answered)d2++;});
  document.getElementById('prog-ch02').style.width=(d2/57*100)+'%';
  document.getElementById('prog-text-ch02').textContent=d2+' / 57';
}

// ── Chapter switching ─────────────────────────────────────────────
let currentCh='ch01';
function _switchChapter(ch){
  currentCh=ch;
  document.querySelectorAll('.chapter-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(ch).classList.add('active');
}
function showChapter(ch,el){
  _switchChapter(ch);
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

// ── Init ──────────────────────────────────────────────────────────
(function init(){
  // Default order (no shuffle at start — maintain textbook order)
  qOrder.ch01 = [...Array(QUESTIONS.ch01.length).keys()];
  qOrder.ch02 = [...Array(QUESTIONS.ch02.length).keys()];
  // Default option order = original
  ALL_IDS.forEach(id=>{
    const q=findQ(id);
    optOrder[id]=[...Array(q.opts.length).keys()];
  });
  renderQuestions('ch01', qOrder.ch01);
  renderQuestions('ch02', qOrder.ch02);
})();
</script>
